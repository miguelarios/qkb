# Legacy Python (qkb-search) PyPI release. Disabled from auto-firing on `v*`
# tags — those now belong to the npm release workflow for the TypeScript
# rewrite (see docs/plans/2026-07-20-typescript-rewrite.md, Task 17).
# qkb-search v0.3.0 is already published; this workflow is kept, manual-only,
# in case a Python-side patch release is ever needed.
name: Release (legacy Python)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: legacy/python/dist/ }
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC)
      contents: write   # GitHub release
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
      - uses: softprops/action-gh-release@v2
        with: { files: "dist/*" }
