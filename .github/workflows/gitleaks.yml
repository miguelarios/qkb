name: gitleaks
on:
  push: { branches: [main] }
  pull_request:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # full history so the scan covers every commit
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan git history
        run: gitleaks git -c .gitleaks.toml --redact --verbose .
