name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false # one failing cell shouldn't cancel (and mask) the others
      matrix:
        node: ["20", "22"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ matrix.node }}"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx biome check .
      - run: npx tsc --noEmit
      - run: npm run build
