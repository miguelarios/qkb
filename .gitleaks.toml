# Repo-level gitleaks config for the PUBLIC qkb repo.
# Enforced in CI (.github/workflows/gitleaks.yml) and optionally via pre-commit.
#
# NOTE: this file is public. It must NOT enumerate the maintainer's real names,
# personal domains, or home path — doing so would itself leak PII. Those stay in
# the maintainer's private machine-level hook. Here we use the full default
# secret ruleset, add a generic absolute-home-path guard, and allowlist the
# project's canonical synthetic test data (see CLAUDE.md) so intentional
# fixtures don't produce false positives.
title = "qkb"

[extend]
useDefault = true # all ~150 built-in gitleaks secret rules

# Generic PII guard: an absolute /Users/<name>/ or /home/<name>/ path in a
# public repo leaks a username. Use ~/ or /path/to/ instead. RE2-safe (no
# lookahead); known CI runner homes are allowlisted below.
[[rules]]
id = "absolute-home-path"
description = "Absolute home path leaks a username — use ~/ or /path/to/ in a public repo"
regex = '''/(?:Users|home)/[a-zA-Z][a-zA-Z0-9._-]+/'''
tags = ["pii", "path"]

[allowlist]
description = "Canonical synthetic values (CLAUDE.md) — intentional, never real PII"
regexTarget = "line"
regexes = [
  # RFC 2606 reserved documentation domains
  '''example\.(?:com|org|net|internal)''',
  # RFC 5737 reserved documentation IP ranges
  '''(?:192\.0\.2|198\.51\.100|203\.0\.113)\.[0-9]{1,3}''',
  # NANP reserved fiction phone range (+1-555-0100 .. +1-555-0199)
  '''\+1-555-01[0-9]{2}''',
  # CI runner home paths are not PII
  '''/(?:Users|home)/(?:runner|ubuntu|test|user)/''',
]
paths = [
  # This config's own documented example patterns.
  '''\.gitleaks\.toml$''',
]
